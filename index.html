<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wuji Hand 2 &mdash; Right Hand Range of Motion</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Ctext%20y%3D%22.9em%22%20font-size%3D%2290%22%3E%E2%9C%8C%F0%9F%8F%BC%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="style.css" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
      "urdf-loader": "https://cdn.jsdelivr.net/npm/urdf-loader@0.13.0/src/URDFLoader.js"
    }
  }
  </script>
</head>
<body>
  <div id="viewer"></div>

  <div id="loading" class="overlay">
    <div class="spinner"></div>
    <div id="loading-text">Loading hand model&hellip;</div>
  </div>

  <header id="title">
    <span class="title-main">Wuji Hand 2</span>
    <span class="title-sub">Right Hand &middot; Range of Motion Explorer</span>
  </header>

  <aside id="panel">
    <section class="card">
      <h2>Display</h2>
      <label class="row">
        <input type="checkbox" id="toggle-meshes" checked />
        <span>Show meshes</span>
      </label>
      <label class="row slider-row">
        <span class="slider-label">Mesh opacity</span>
        <input type="range" id="mesh-opacity" min="0.05" max="1" step="0.05" value="0.35" />
      </label>
      <label class="row">
        <input type="checkbox" id="toggle-skeleton" checked />
        <span>Show kinematic skeleton</span>
      </label>
      <label class="row">
        <input type="checkbox" id="toggle-grid" checked />
        <span>Show grid</span>
      </label>
    </section>

    <section class="card">
      <h2>Range of Motion</h2>
      <p class="hint">Toggle the reachable fingertip envelope for each finger.</p>
      <div id="finger-toggles"></div>
    </section>

    <section class="card">
      <div class="card-head">
        <h2>Joints</h2>
        <button id="reset-pose" class="btn-small">Reset</button>
      </div>
      <div id="joint-sliders"></div>
    </section>

    <footer class="panel-footer">
      Drag to orbit &middot; scroll to zoom &middot; right-drag to pan
    </footer>
  </aside>

  <script type="module" src="app.js"></script>
</body>
</html>
